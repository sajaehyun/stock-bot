name: Intraday 30min Analysis
on:
  schedule:
    # 30분마다 (오후 1시~11시)
- cron: '0 4 * * *'   # UTC 04:00 = KST 13:00 (오후 1시) ✓
- cron: '30 4 * * *'  # UTC 04:30 = KST 13:30 ✓
- cron: '0 5 * * *'   # UTC 05:00 = KST 14:00 (오후 2시) ✓
- cron: '30 5 * * *'  # UTC 05:30 = KST 14:30 ✓
- cron: '0 6 * * *'   # UTC 06:00 = KST 15:00 (오후 3시) ✓
- cron: '30 6 * * *'  # UTC 06:30 = KST 15:30 ✓
- cron: '0 7 * * *'   # UTC 07:00 = KST 16:00 (오후 4시) ✓
- cron: '30 7 * * *'  # UTC 07:30 = KST 16:30 ✓
- cron: '0 8 * * *'   # UTC 08:00 = KST 17:00 (오후 5시) ✓
- cron: '30 8 * * *'  # UTC 08:30 = KST 17:30 ✓
- cron: '0 9 * * *'   # UTC 09:00 = KST 18:00 (오후 6시) ✓
- cron: '30 9 * * *'  # UTC 09:30 = KST 18:30 ✓
- cron: '0 10 * * *'  # UTC 10:00 = KST 19:00 (오후 7시) ✓
- cron: '30 10 * * *' # UTC 10:30 = KST 19:30 ✓
- cron: '0 11 * * *'  # UTC 11:00 = KST 20:00 (오후 8시) ✓
- cron: '30 11 * * *' # UTC 11:30 = KST 20:30 ✓
- cron: '0 12 * * *'  # UTC 12:00 = KST 21:00 (오후 9시) ✓
- cron: '30 12 * * *' # UTC 12:30 = KST 21:30 ✓
- cron: '0 13 * * *'  # UTC 13:00 = KST 22:00 (오후 10시) ✓
- cron: '30 13 * * *' # UTC 13:30 = KST 22:30 ✓
- cron: '0 14 * * *'  # UTC 14:00 = KST 23:00 (오후 11시) ✓
- cron: '30 14 * * *' # UTC 14:30 = KST 23:30 ✓

  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install -r requirements.txt
      - run: python intraday_bot.py
